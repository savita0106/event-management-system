<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Teams - EventPortal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="app.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">EventPortal</div>
      <nav class="nav">
        <a href="view-events.html">View Events</a>
        <a href="my-registrations.html">My Registrations</a>
        <a class="active" href="my-teams.html">My Teams</a>
        <a href="role.html" id="logoutLink">Logout</a>
      </nav>
    </div>
  </header>

  <main class="page">
  <h1 class="page-title">My Teams</h1>
  <p class="subtext">Create teams and use them while registering for events</p>

  <section class="panel">
    <h2 style="margin-bottom:16px;">Create Team</h2>

    <form id="teamForm">
      <label>Team Name</label>
      <input id="teamName" type="text" placeholder="Enter team name" required>

      <label>Total Members in Team</label>
      <input id="teamSize" type="number" min="2" max="5" placeholder="2 to 5" required>

      <div id="teamEmailsWrap" style="margin-top:14px;"></div>

      <button id="createTeamBtn" type="submit">Create Team</button>
      <p id="teamMsg" class="empty" style="margin-top:10px;"></p>
    </form>
  </section>

  <section style="margin-top:24px;">
    <div id="myTeamsGrid" class="grid"></div>
    <p id="emptyTeamsMsg" class="empty">No teams found.</p>
  </section>
</main>
</body>
</html>
