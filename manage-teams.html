<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Teams - EventPortal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="app.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">EventPortal</div>
      <nav class="nav">
        <a href="view-events.html">View Events</a>
        <a href="admin-create.html">Create</a>
        <a href="admin-edit.html">Edit</a>
        <a href="manage-attendees.html">Manage Attendees</a>
        <a class="active" href="manage-teams.html">Manage Teams</a>
        <a href="analytics.html">Analytics</a>
        <a href="role.html" id="logoutLink">Logout</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">Manage Teams</h1>
    <p class="subtext">Admin only</p>

    <section>
      <div id="teamEventGrid" class="grid"></div>
      <p id="emptyTeamEvents" class="empty">No events found.</p>
    </section>

    <section class="panel" style="margin-top:16px;">
      <h2 id="selectedTeamEventTitle" style="margin-bottom:16px;">Select an event</h2>
      <div id="adminTeamGrid" class="grid"></div>
      <p id="emptyAdminTeams" class="empty">No teams selected.</p>
    </section>

    <section class="panel" style="margin-top:16px;">
      <h2 id="selectedAdminTeamTitle" style="margin-bottom:16px;">Select a team</h2>
      <div id="adminTeamMembersGrid" class="grid"></div>
      <p id="emptyAdminTeamMembers" class="empty">No team members selected.</p>
    </section>
  </main>
</body>
</html>
