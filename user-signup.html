<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Sign Up - EventPortal</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div class="login-box">
    <h1>Create User Account</h1>
    <p>Sign in to explore events and manage your registrations</p>

    <form id="signupForm">
      <label>Username</label>
      <input id="username" type="text" placeholder="Create username" required>

      <label>Password</label>
      <input id="password" type="password" placeholder="Create password" required>

      <button type="submit">Sign Up</button>
      <p id="msg" class="msg"></p>
    </form>

    <div class="small-text">
      Already have an account? <a href="user-login.html">Sign in</a>
    </div>
    <div class="small-text">
      <a href="role.html">Back</a>
    </div>
  </div>
</body>
</html>
