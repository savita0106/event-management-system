<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Analytics - EventPortal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">EventPortal</div>
      <nav class="nav">
        <a href="view-events.html">View Events</a>
        <a href="admin-create.html">Create</a>
        <a href="admin-edit.html">Edit</a>
        <a href="manage-attendees.html">Manage Attendees</a>
        <a class="active" href="analytics.html">Analytics</a>
        <a href="role.html" id="logoutLink">Logout</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">Event Registration Analytics</h1>
    <p class="subtext">Admin only</p>

    <section class="stats-row">
      <div class="stat-card">
        <p>Total Events</p>
        <h2 id="totalEvents">0</h2>
      </div>
      <div class="stat-card">
        <p>Total Registrations</p>
        <h2 id="totalRegistrations">0</h2>
      </div>
      <div class="stat-card">
        <p>Total Waitlisted</p>
        <h2 id="totalWaitlisted">0</h2>
      </div>
      <div class="stat-card">
        <p>Seat Occupancy</p>
        <h2 id="occupancyRate">0%</h2>
      </div>
    </section>

    <section class="charts-row">
      <div class="chart-card">
        <h3>Registrations by Event</h3>
        <canvas id="barChart"></canvas>
      </div>

      <div class="chart-card">
        <h3>Overall Seat Distribution</h3>
        <canvas id="donutChart"></canvas>
      </div>
    </section>

    <section class="panel">
      <h2 style="margin-bottom:16px;">Event Details</h2>
      <div id="analyticsGrid" class="grid"></div>
      <p id="emptyMsg" class="empty">No analytics available.</p>
    </section>
  </main>
</body>
</html>
